function renderAllForecastTable() {
  const months = getForecastMonths();
  const ALL_KEYS = ['philharmonic', 'scentgallery', 'personal', 'aromaticlab'];
  const allFixedSum = ALL_KEYS.reduce((s, key) => s + DATA.accounts[key].fixed.reduce((ss, f) => ss + (f.amount || 0), 0), 0);

  let html = `
    <table class="forecast-table">
      <thead>
        <tr>
          <th>월말</th>
          <th class="num">예상 총잔고</th>
          <th class="num">실제 합산</th>
          <th class="num">차이</th>
          <th class="num">매출</th>
          <th class="num">원가</th>
          <th class="num">광고비</th>
          <th class="num">1회성</th>
          <th class="num">제품투자</th>
          <th class="num">고정비</th>
          <th class="num">순익</th>
        </tr>
      </thead>
      <tbody>
  `;
  months.forEach((m, idx) => {
    let expectedSum = 0;
    let actualSum = 0;
    let allActual = true;
    let revenueSum = 0, cogsSum = 0, adsSum = 0, expSum = 0, invSum = 0;

    ALL_KEYS.forEach(key => {
      const acc = DATA.accounts[key];
      expectedSum += calcExpectedBalance(key, idx);
      const actual = acc.forecast[m.key];
      if (actual !== undefined && actual !== null && actual !== '') {
        actualSum += parseFloat(actual);
      } else {
        allActual = false;
      }
      const pnl = acc.pnl[m.key] || {};
      revenueSum += pnl.revenue || 0;
      cogsSum += pnl.cogs || 0;
      adsSum += acc.ads.filter(a => (a.date || '').startsWith(m.key)).reduce((s, a) => s + (a.amount || 0), 0);
      expSum += acc.expenses.filter(e => (e.date || '').startsWith(m.key)).reduce((s, e) => s + (e.amount || 0), 0);
      invSum += (acc.investment || []).filter(i => (i.date || '').startsWith(m.key)).reduce((s, i) => s + (i.amount || 0), 0);
    });

    const actualDisplay = allActual ? fmt(actualSum) : '<span style="color: var(--text-dim);">일부</span>';
    let diffHtml = '<span class="diff-zero">—</span>';
    if (allActual) {
      const diff = actualSum - expectedSum;
      if (diff > 0) diffHtml = `<span class="diff-positive">+${fmt(diff)}</span>`;
      else if (diff < 0) diffHtml = `<span class="diff-negative">${fmt(diff)}</span>`;
      else diffHtml = `<span class="diff-zero">0</span>`;
    }

    // 투자는 비용 아님 (재고로 전환), 순익 계산 제외
    const profit = revenueSum - cogsSum - adsSum - allFixedSum - expSum;
    const hasAnyData = revenueSum > 0 || cogsSum > 0 || adsSum > 0 || expSum > 0 || invSum > 0;
    const profitClass = !hasAnyData ? 'diff-zero' : (profit >= 0 ? 'diff-positive' : 'diff-negative');
    const profitDisplay = !hasAnyData ? '—' : fmt(profit);

    html += `
      <tr>
        <td class="month-cell">${m.label}</td>
        <td class="num">${fmt(expectedSum)}</td>
        <td class="num">${actualDisplay}</td>
        <td class="num">${diffHtml}</td>
        <td class="num" style="color: ${revenueSum > 0 ? 'var(--ok)' : 'var(--text-dim)'};">${revenueSum > 0 ? fmt(revenueSum) : '—'}</td>
        <td class="num" style="color: ${cogsSum > 0 ? 'var(--danger)' : 'var(--text-dim)'};">${cogsSum > 0 ? fmt(cogsSum) : '—'}</td>
        <td class="num" style="color: ${adsSum > 0 ? 'var(--danger)' : 'var(--text-dim)'};">${adsSum > 0 ? fmt(adsSum) : '—'}</td>
        <td class="num" style="color: ${expSum > 0 ? 'var(--danger)' : 'var(--text-dim)'};">${expSum > 0 ? fmt(expSum) : '—'}</td>
        <td class="num" style="color: ${invSum > 0 ? 'var(--navy)' : 'var(--text-dim)'};" title="비용 아님 · 재고로 전환">${invSum > 0 ? fmt(invSum) : '—'}</td>
        <td class="num" style="color: var(--text-dim);">${fmt(allFixedSum)}</td>
        <td class="num"><span class="${profitClass}" style="font-weight: 700;">${profitDisplay}</span></td>
      </tr>
    `;
  });
  html += '</tbody></table>';
  return html;
}

// ==================== 버전 ====================
function renderVersionSectionFor(tabKey) {
  let html = `
    <div class="version-section">
      <div class="version-toggle">
        <h3>📦 저장된 버전 (${DATA.versions.length})</h3>
        <span class="chevron">▸</span>
      </div>
      <div class="version-body">
  `;
  if (DATA.versions.length === 0) {
    html += `<div class="version-empty">저장된 버전이 없습니다. "↑ 저장" 버튼을 누르세요.</div>`;
  } else {
    const sorted = [...DATA.versions].sort((a, b) => b.timestamp.localeCompare(a.timestamp));
    sorted.forEach(v => {
      const date = new Date(v.timestamp);
      const label = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
      const snapshot = v.snapshot;
      let totalBal = 0;
      if (snapshot.accounts) {
        Object.values(snapshot.accounts).forEach(a => { totalBal += (a.balance || 0); });
      }
      html += `
        <div class="version-item">
          <div class="version-date">${label}</div>
          <div class="version-label">총잔고 ${fmt(totalBal)}</div>
          <button class="xs ok-btn" data-restore-version="${v.id}">복원</button>
          <button class="xs danger-btn" data-delete-version="${v.id}">삭제</button>
        </div>
      `;
    });
  }
  html += '</div></div>';
  return html;
}

async function saveVersion() {
  const snapshot = {
    accounts: JSON.parse(JSON.stringify(DATA.accounts)),
    loans: JSON.parse(JSON.stringify(DATA.loans || [])),
    baseDate: DATA.baseDate,
    tabNames: { ...DATA.tabNames },
    tabOrder: [...DATA.tabOrder]
  };
  const version = {
    id: 'v_' + Date.now(),
    timestamp: new Date().toISOString(),
    snapshot
  };
  DATA.versions.push(version);
  saveToLocal();

  const active = getActiveTab();
  renderAllTab();
  ['philharmonic', 'scentgallery', 'personal', 'aromaticlab'].forEach(k => renderAccountTab(k));
  renderLoansTab();
  if (active) switchTab(active);

  const cfg = getGithubConfig();
  if (cfg) {
    await saveToGithub();
  } else {
    showStatus('✓ 로컬에 버전 저장됨');
  }
}

function restoreVersion(id) {
  const v = DATA.versions.find(x => x.id === id);
  if (!v) return;

  const buttons = document.querySelectorAll(`[data-restore-version="${id}"]`);
  if (buttons.length === 0) return;
  const button = buttons[0];

  if (button.dataset.confirming === '1') {
    // 두 번째 클릭 = 복원 실행
    DATA.accounts = JSON.parse(JSON.stringify(v.snapshot.accounts));
    if (Array.isArray(v.snapshot.loans)) DATA.loans = JSON.parse(JSON.stringify(v.snapshot.loans));
    if (v.snapshot.baseDate) DATA.baseDate = v.snapshot.baseDate;
    if (v.snapshot.tabNames) DATA.tabNames = { ...v.snapshot.tabNames };
    if (v.snapshot.tabOrder) DATA.tabOrder = [...v.snapshot.tabOrder];
    autoSave();
    renderAll();
    showStatus('✓ 버전 복원됨');
  } else {
    buttons.forEach(b => {
      b.dataset.confirming = '1';
      b.textContent = '덮어쓸까?';
      b.style.background = 'var(--accent)';
      b.style.color = '#fff';
    });
    setTimeout(() => {
      buttons.forEach(b => {
        if (b.dataset.confirming === '1') {
          b.dataset.confirming = '0';
          b.textContent = '복원';
          b.style.background = '';
          b.style.color = '';
        }
      });
    }, 3000);
  }
}

function deleteVersion(id) {
  // 두 번 클릭 방식: 첫 번째는 확인 상태, 두 번째는 실제 삭제
  const buttons = document.querySelectorAll(`[data-delete-version="${id}"]`);
  if (buttons.length === 0) return;
  const button = buttons[0]; // 대표 버튼 하나로 상태 판단

  if (button.dataset.confirming === '1') {
    // 두 번째 클릭 = 실제 삭제
    DATA.versions = DATA.versions.filter(v => v.id !== id);
    autoSave();
    const active = getActiveTab();
    renderAllTab();
    ['philharmonic', 'scentgallery', 'personal', 'aromaticlab'].forEach(k => renderAccountTab(k));
    renderLoansTab();
    if (active) switchTab(active);
    showStatus('✓ 버전 삭제됨');
  } else {
    // 첫 번째 클릭 = 확인 상태
    buttons.forEach(b => {
      b.dataset.confirming = '1';
      b.textContent = '한번더';
      b.style.background = 'var(--danger)';
      b.style.color = '#fff';
    });
    setTimeout(() => {
      buttons.forEach(b => {
        if (b.dataset.confirming === '1') {
          b.dataset.confirming = '0';
          b.textContent = '삭제';
          b.style.background = '';
          b.style.color = '';
        }
      });
    }, 3000);
  }
}

// ==================== GitHub (Gist / Repo 듀얼 모드) ====================
function getGithubConfig() {
  try {
    const raw = localStorage.getItem(GH_CONFIG_KEY);
    if (!raw) return null;
    const cfg = JSON.parse(raw);
    // 하위호환: mode 없으면 repo로 간주
    if (!cfg.mode) cfg.mode = 'repo';
    return cfg;
  } catch (e) { return null; }
}

function updateGhStatus() {
  const cfg = getGithubConfig();
  const el = document.getElementById('ghStatus');
  if (!cfg || !cfg.token) {
    el.textContent = '클라우드 미연동';
    el.classList.remove('connected');
    return;
  }
  if (cfg.mode === 'gist' && cfg.gistId) {
    el.textContent = `Gist: ${cfg.gistId.slice(0, 8)}…`;
    el.classList.add('connected');
  } else if (cfg.mode === 'repo' && cfg.owner && cfg.repo) {
    el.textContent = `${cfg.owner}/${cfg.repo}`;
    el.classList.add('connected');
  } else {
    el.textContent = '클라우드 미연동';
    el.classList.remove('connected');
  }
}

function switchConfigMode(mode) {
  const gistBlock = document.getElementById('gistConfigBlock');
  const repoBlock = document.getElementById('repoConfigBlock');
  const gistBtn = document.getElementById('modeGistBtn');
  const repoBtn = document.getElementById('modeRepoBtn');
  if (mode === 'gist') {
    gistBlock.style.display = '';
    repoBlock.style.display = 'none';
    gistBtn.style.background = 'var(--accent)';
    gistBtn.style.color = '#fff';
    repoBtn.style.background = 'var(--surface-2)';
    repoBtn.style.color = 'var(--text)';
  } else {
    gistBlock.style.display = 'none';
    repoBlock.style.display = '';
    repoBtn.style.background = 'var(--accent)';
    repoBtn.style.color = '#fff';
    gistBtn.style.background = 'var(--surface-2)';
    gistBtn.style.color = 'var(--text)';
  }
  // 상태를 모달 루트에 저장 (저장시 참조)
  document.getElementById('githubModal').dataset.mode = mode;
}

function openGithubModal() {
  const cfg = getGithubConfig() || {};
  const mode = cfg.mode || 'gist'; // 기본 Gist
  // Gist 필드
  document.getElementById('ghGistId').value = cfg.gistId || '';
  document.getElementById('ghGistFilename').value = cfg.gistFilename || 'budget.json';
  document.getElementById('ghGistToken').value = mode === 'gist' ? (cfg.token || '') : '';
  // Repo 필드
  document.getElementById('ghOwner').value = cfg.owner || '';
  document.getElementById('ghRepo').value = cfg.repo || '';
  document.getElementById('ghBranch').value = cfg.branch || 'main';
  document.getElementById('ghPath').value = cfg.path || 'data/budget.json';
  document.getElementById('ghToken').value = mode === 'repo' ? (cfg.token || '') : '';

  switchConfigMode(mode);
  document.getElementById('githubModal').classList.add('active');
}

function closeGithubModal() {
  document.getElementById('githubModal').classList.remove('active');
}

function saveGithubConfig() {
  const mode = document.getElementById('githubModal').dataset.mode || 'gist';
  let cfg;
  if (mode === 'gist') {
    cfg = {
      mode: 'gist',
      gistId: document.getElementById('ghGistId').value.trim(),
      gistFilename: document.getElementById('ghGistFilename').value.trim() || 'budget.json',
      token: document.getElementById('ghGistToken').value.trim()
    };
    if (!cfg.gistId || !cfg.token) {
      alert('Gist ID와 토큰은 필수입니다.');
      return;
    }
  } else {
    cfg = {
      mode: 'repo',
      owner: document.getElementById('ghOwner').value.trim(),
      repo: document.getElementById('ghRepo').value.trim(),
      branch: document.getElementById('ghBranch').value.trim() || 'main',
      path: document.getElementById('ghPath').value.trim() || 'data/budget.json',
      token: document.getElementById('ghToken').value.trim()
    };
    if (!cfg.owner || !cfg.repo || !cfg.token) {
      alert('Owner, Repo, Token은 필수입니다.');
      return;
    }
  }
  localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(cfg));
  updateGhStatus();
  closeGithubModal();
  showStatus(`✓ ${mode === 'gist' ? 'Gist' : 'Repo'} 설정 저장됨`);
}

function clearGithubConfig() {
  // 두 번 클릭 방식
  const btn = event.currentTarget;
  if (btn.dataset.confirming === '1') {
    localStorage.removeItem(GH_CONFIG_KEY);
    updateGhStatus();
    closeGithubModal();
    showStatus('✓ 연동 해제됨');
  } else {
    btn.dataset.confirming = '1';
    btn.textContent = '진짜 해제?';
    setTimeout(() => {
      if (btn.dataset.confirming === '1') {
        btn.dataset.confirming = '0';
        btn.textContent = '해제';
      }
    }, 3000);
  }
}

// 통합 저장 함수 (모드에 따라 분기)
async function saveToGithub() {
  const cfg = getGithubConfig();
  if (!cfg) { alert('먼저 클라우드 설정을 완료해주세요.'); return; }
  if (cfg.mode === 'gist') return saveToGist(cfg);
  return saveToRepo(cfg);
}

async function loadFromGithub() {
  const cfg = getGithubConfig();
  if (!cfg) { alert('먼저 클라우드 설정을 완료해주세요.'); return; }
  if (cfg.mode === 'gist') return loadFromGist(cfg);
  return loadFromRepo(cfg);
}

// ===== Gist API =====
async function saveToGist(cfg) {
  const el = document.getElementById('ghStatus');
  el.classList.add('syncing');
  el.textContent = 'Gist 저장 중...';
  try {
    DATA.updated = new Date().toISOString();
    const content = JSON.stringify(DATA, null, 2);
    const url = `https://api.github.com/gists/${cfg.gistId}`;
    const body = {
      files: {
        [cfg.gistFilename]: { content: content }
      }
    };
    const res = await fetch(url, {
      method: 'PATCH',
      headers: {
        'Authorization': `token ${cfg.token}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github+json'
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${res.status}`);
    }
    updateGhStatus();
    showStatus('✓ Gist 저장 완료');
  } catch (err) {
    updateGhStatus();
    showStatus('✗ Gist 저장 실패: ' + err.message, 'var(--danger)');
  }
}

async function loadFromGist(cfg) {
  const el = document.getElementById('ghStatus');
  el.classList.add('syncing');
  el.textContent = 'Gist 불러오는 중...';
  try {
    const url = `https://api.github.com/gists/${cfg.gistId}`;
    const res = await fetch(url, {
      headers: {
        'Authorization': `token ${cfg.token}`,
        'Accept': 'application/vnd.github+json'
      }
    });
    if (!res.ok) {
      if (res.status === 404) throw new Error('Gist를 찾을 수 없습니다. ID 확인 필요.');
      throw new Error(`HTTP ${res.status}`);
    }
    const gist = await res.json();
    if (!gist.files || !gist.files[cfg.gistFilename]) {
      throw new Error(`파일 "${cfg.gistFilename}"이 Gist에 없습니다. 먼저 저장해주세요.`);
    }
    const content = gist.files[cfg.gistFilename].content;
    if (!content) throw new Error('파일 내용이 비어있습니다.');
    DATA = mergeWithDefaults(JSON.parse(content));
    saveToLocal();
    renderAll();
    updateGhStatus();
    showStatus('✓ Gist에서 불러옴');
  } catch (err) {
    updateGhStatus();
    showStatus('✗ 불러오기 실패: ' + err.message, 'var(--danger)');
  }
}

// ===== Repo API =====
async function saveToRepo(cfg) {
  const el = document.getElementById('ghStatus');
  el.classList.add('syncing');
  el.textContent = 'Repo 저장 중...';
  try {
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`;
    let sha = null;
    try {
      const getRes = await fetch(url + `?ref=${cfg.branch}`, {
        headers: { 'Authorization': `token ${cfg.token}` }
      });
      if (getRes.ok) {
        const existing = await getRes.json();
        sha = existing.sha;
      }
    } catch (e) {}
    DATA.updated = new Date().toISOString();
    const content = JSON.stringify(DATA, null, 2);
    const encoded = btoa(unescape(encodeURIComponent(content)));
    const body = {
      message: `Update budget ${new Date().toISOString().slice(0,16).replace('T',' ')}`,
      content: encoded,
      branch: cfg.branch
    };
    if (sha) body.sha = sha;
    const res = await fetch(url, {
      method: 'PUT',
      headers: { 'Authorization': `token ${cfg.token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || `HTTP ${res.status}`);
    }
    updateGhStatus();
    showStatus('✓ Repo 저장 완료');
  } catch (err) {
    updateGhStatus();
    showStatus('✗ 저장 실패: ' + err.message, 'var(--danger)');
  }
}

async function loadFromRepo(cfg) {
  const el = document.getElementById('ghStatus');
  el.classList.add('syncing');
  el.textContent = 'Repo 불러오는 중...';
  try {
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}?ref=${cfg.branch}`;
    const res = await fetch(url, { headers: { 'Authorization': `token ${cfg.token}` } });
    if (!res.ok) {
      if (res.status === 404) throw new Error('파일이 아직 없습니다. 먼저 저장해주세요.');
      throw new Error(`HTTP ${res.status}`);
    }
    const file = await res.json();
    const content = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
    DATA = mergeWithDefaults(JSON.parse(content));
    saveToLocal();
    renderAll();
    updateGhStatus();
    showStatus('✓ Repo에서 불러옴');
  } catch (err) {
    updateGhStatus();
    showStatus('✗ 불러오기 실패: ' + err.message, 'var(--danger)');
  }
}

// ==================== 초기화 ====================
function renderAll() {
  renderTabs();
  renderTabContents();
  renderAllTab();
  ['philharmonic', 'scentgallery', 'personal', 'aromaticlab'].forEach(k => renderAccountTab(k));
  renderLoansTab();
  // 첫 탭 활성화
  const firstTab = DATA.tabOrder[0] || 'all';
  switchTab(firstTab);
}

renderAll();
updateGhStatus();

// 설정 모달 탭 전환 이벤트
document.getElementById('modeGistBtn').addEventListener('click', () => switchConfigMode('gist'));
document.getElementById('modeRepoBtn').addEventListener('click', () => switchConfigMode('repo'));

// 첫 진입 안내: 데이터가 비어있고 클라우드 설정도 없을 때
function showFirstRunBanner() {
  const hasData = Object.values(DATA.accounts || {}).some(a =>
    (a.balance > 0) || (a.fixed && a.fixed.length > 0) || (a.expenses && a.expenses.length > 0)
  );
  const hasLoans = (DATA.loans || []).length > 0;
  const cfg = getGithubConfig();

  if (!hasData && !hasLoans && !cfg) {
    // 빈 상태 + 클라우드 미연동 → 안내 배너 삽입
    const banner = document.createElement('div');
    banner.id = 'firstRunBanner';
    banner.style.cssText = `
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: var(--surface); border: 1px solid var(--accent);
      padding: 28px 32px; max-width: 480px; width: 92vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15); z-index: 9999;
      font-family: inherit;
    `;
    banner.innerHTML = `
      <h2 style="margin: 0 0 12px; color: var(--accent); font-size: 1.15rem;">👋 환영합니다</h2>
      <p style="margin: 0 0 12px; font-size: 0.88rem; color: var(--text); line-height: 1.6;">
        이 대시보드는 데이터를 <strong>클라우드(Gist 또는 Repo)</strong>에 저장합니다.
      </p>
      <p style="margin: 0 0 16px; font-size: 0.82rem; color: var(--text-mid); line-height: 1.6;">
        <strong>처음 사용자:</strong> 우측 상단 <code style="background: var(--surface-2); padding: 2px 6px;">⚙</code> 버튼으로 설정 후 직접 입력<br>
        <strong>기존 사용자:</strong> 설정 완료 후 <code style="background: var(--surface-2); padding: 2px 6px;">↓</code> 버튼으로 데이터 불러오기
      </p>
      <div style="display: flex; gap: 8px; margin-top: 16px;">
        <button onclick="document.getElementById('firstRunBanner').remove(); openGithubModal();" style="flex: 1; padding: 10px; background: var(--accent); color: #fff; border: none; font-family: inherit; font-weight: 600; cursor: pointer;">
          ⚙ 설정 시작
        </button>
        <button onclick="document.getElementById('firstRunBanner').remove();" style="padding: 10px 16px; background: var(--surface-2); color: var(--text); border: 1px solid var(--line); font-family: inherit; cursor: pointer;">
          나중에
        </button>
      </div>
    `;
    document.body.appendChild(banner);
  }
}
// 페이지 로드 완료 후 배너 표시
setTimeout(showFirstRunBanner, 300);

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveVersion();
  }
});
</script>
